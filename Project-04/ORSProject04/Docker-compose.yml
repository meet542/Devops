version: "3.9"
services:
  mysql:
    image: mysql:8.0
    container_name: orsproject-04-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root@789
      MYSQL_DATABASE: p04
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql 
  webapp:
    build: .
    container_name: orsproject-04-webapp
    ports:
      - "8080:8080"
    depends_on:
      - mysql

volumes:
  mysql_data: